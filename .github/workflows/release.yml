name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

# Serialize releases on a branch. Never cancel an in-flight run: interrupting a
# publish could tag/commit without publishing to crates.io (or vice versa).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      # actions/checkout@v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      # actions/setup-node@v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install release dependencies
        run: npm ci

      - name: Determine next release
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          function currentCargoVersion() {
            const cargoToml = fs.readFileSync('Cargo.toml', 'utf8');
            const match = cargoToml.match(/^version = "([^"]+)"/m);
            if (!match) {
              throw new Error('could not find package.version in Cargo.toml');
            }
            return match[1];
          }

          async function main() {
            const { default: semanticRelease } = await import('semantic-release');
            const result = await semanticRelease({ dryRun: true, ci: false });
            const output = process.env.GITHUB_OUTPUT;

            if (!result) {
              const version = currentCargoVersion();
              fs.appendFileSync(output, 'should_release=false\n');
              fs.appendFileSync(output, `version=${version}\n`);
              fs.appendFileSync(output, `tag=v${version}\n`);
              return;
            }

            const version = result.nextRelease.version;
            fs.appendFileSync(output, `should_release=true\n`);
            fs.appendFileSync(output, `version=${version}\n`);
            fs.appendFileSync(output, `tag=v${version}\n`);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

  test:
    name: Test
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # Gate the release on the test suite. A release can be triggered
      # independently (workflow_dispatch / direct push to main), so we never
      # publish a version that was not tested. Runs on stable, matching the
      # published crate's toolchain policy.
      - name: Install stable toolchain
        run: rustup toolchain install stable --profile minimal

      # Swatinem/rust-cache@v2.9.1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          key: release-test

      - name: Run tests
        run: cargo +stable test

  release:
    name: Publish
    needs: [prepare, test]
    if: needs.prepare.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      # cargo publish compiles the crate; use stable, matching the crate policy.
      - name: Install stable toolchain
        run: rustup toolchain install stable --profile minimal

      # Swatinem/rust-cache@v2.9.1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          key: release-publish

      # actions/setup-node@v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install release dependencies
        run: npm ci

      - name: Release
        if: needs.prepare.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: npx semantic-release
